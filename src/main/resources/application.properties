spring.application.name=ApiGateway
server.port=8080
# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=localhost
# User Service Route
spring.cloud.gateway.server.webflux.routes[0].id=user-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://USERSERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/users/**

# Job Service Route
spring.cloud.gateway.server.webflux.routes[1].id=job-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://JOBSERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/jobs/**

# Application Service Route
spring.cloud.gateway.server.webflux.routes[2].id=application-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://APPLICATIONSERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/applications/**

# Discovery Locator
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true
